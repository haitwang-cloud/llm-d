<svg xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif" viewBox="0 0 750 320"><defs><marker id="arr" markerHeight="6" markerWidth="8" orient="auto" refX="8" refY="3"><polygon fill="#000" points="0 0 8 3 0 6"/></marker><marker id="arr-back" markerHeight="6" markerWidth="8" orient="auto" refX="0" refY="3"><polygon fill="#666" points="8 0 0 3 8 6"/></marker></defs><rect width="746" height="316" x="2" y="2" fill="#fff" stroke="#9f659f" stroke-width="3" rx="0"/><text x="375" y="28" fill="#000" font-size="13" font-weight="bold" text-anchor="middle">IPP Request Flow</text><rect width="100" height="80" x="20" y="100" fill="#f3f3f3" stroke="#d9d2e9" stroke-width="1" rx="3"/><text x="70" y="125" fill="#000" font-size="11" font-weight="bold" text-anchor="middle">Client</text><text x="70" y="145" fill="#666" font-size="8" text-anchor="middle">POST /v1/completions</text><text x="70" y="160" fill="#444" font-size="8" text-anchor="middle">{&quot;model&quot;: &quot;...&quot;}</text><line x1="120" x2="198" y1="140" y2="140" stroke="#000" stroke-width="1.5" marker-end="url(#arr)"/><text x="159" y="132" fill="#444" font-size="8" text-anchor="middle">1</text><rect width="180" height="120" x="200" y="80" fill="#e6e6fa" stroke="#9f659f" stroke-width="2" rx="3"/><text x="290" y="105" fill="#000" font-size="12" font-weight="bold" text-anchor="middle">Proxy</text><text x="290" y="125" fill="#666" font-size="8" text-anchor="middle">1. Receive request</text><text x="290" y="140" fill="#666" font-size="8" text-anchor="middle">2. Call llm-d IPP (ext-proc)</text><text x="290" y="155" fill="#666" font-size="8" text-anchor="middle">3. Route by header</text><text x="290" y="170" fill="#666" font-size="8" text-anchor="middle">4. Call llm-d EPP (ext-proc)</text><text x="290" y="185" fill="#666" font-size="8" text-anchor="middle">5. Forward to endpoint</text><rect width="140" height="75" x="220" y="220" fill="#e8f4e8" stroke="#82b366" stroke-width="1.5" rx="3"/><text x="290" y="242" fill="#000" font-size="10" font-weight="bold" text-anchor="middle">llm-d IPP</text><text x="290" y="256" fill="#666" font-size="8" text-anchor="middle">Process payload</text><text x="290" y="270" fill="#666" font-size="8" text-anchor="middle">(pluggable pipeline)</text><text x="290" y="284" fill="#888" font-size="7" text-anchor="middle">(ext-proc)</text><line x1="270" x2="270" y1="200" y2="218" stroke="#000" stroke-width="1.5" marker-end="url(#arr)"/><line x1="310" x2="310" y1="218" y2="200" stroke="#666" stroke-dasharray="3 2" stroke-width="1" marker-end="url(#arr)"/><text x="253" y="212" fill="#444" font-size="7" text-anchor="middle">2</text><rect width="100" height="60" x="430" y="110" fill="#f3f3f3" stroke="#d9d2e9" stroke-width="1" rx="3"/><text x="480" y="132" fill="#000" font-size="10" font-weight="bold" text-anchor="middle">llm-d EPP</text><text x="480" y="148" fill="#666" font-size="8" text-anchor="middle">Select endpoint</text><text x="480" y="161" fill="#888" font-size="7" text-anchor="middle">(ext-proc)</text><line x1="380" x2="428" y1="130" y2="130" stroke="#000" stroke-width="1.5" marker-end="url(#arr)"/><line x1="428" x2="380" y1="150" y2="150" stroke="#666" stroke-dasharray="3 2" stroke-width="1" marker-end="url(#arr)"/><text x="404" y="122" fill="#444" font-size="7" text-anchor="middle">4</text><rect width="140" height="80" x="580" y="100" fill="#f3f3f3" stroke="#d9d2e9" stroke-width="1" rx="3"/><text x="650" y="125" fill="#000" font-size="11" font-weight="bold" text-anchor="middle">Model Server</text><text x="650" y="145" fill="#666" font-size="8" text-anchor="middle">vLLM / SGLang</text><text x="650" y="162" fill="#444" font-size="8" text-anchor="middle">InferencePool</text><line x1="530" x2="578" y1="140" y2="140" stroke="#000" stroke-width="1.5" marker-end="url(#arr)"/><text x="554" y="132" fill="#444" font-size="7" text-anchor="middle">5</text><text x="375" y="308" fill="#888" font-size="9" text-anchor="middle">Proxy consults llm-d IPP and llm-d EPP via ext-proc, then forwards request to selected endpoint</text></svg>